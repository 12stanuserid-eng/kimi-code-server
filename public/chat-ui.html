<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="description" content="Kimi Code — AI-powered coding assistant" />
  <title>Kimi Code</title>
  <link rel="icon" href="/favicon.ico" sizes="64x64" />
  <link rel="manifest" href="/kimi-admin/manifest.json" />
  <!-- Firebase JS SDK (loaded via module pattern) -->
  <script>
    window.__KC_FIREBASE_CONFIG = {
      apiKey: 'AIzaSyCHANGEME-CHANGEME-CHANGEME',
      authDomain: 'kimi-code.firebaseapp.com',
      projectId: 'kimi-code',
      storageBucket: 'kimi-code.appspot.com',
      messagingSenderId: '000000000000',
      appId: '1:000000000000:web:0000000000000000000000'
    };
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
  <style>
    /* Prevent flash of unstyled content — dark background immediately */
    body { margin: 0; background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    /* Loading indicator shown until JS takes over */
    #app { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .initial-loader { text-align: center; }
    .initial-loader svg { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    .initial-loader p { color: #8b949e; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-loader">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
      <p>Loading Kimi Code...</p>
    </div>
  </div>
  <script src="/kimi-admin/chat-ui.js"></script>
  <script>
    // Initialize Firebase as early as possible
    window.addEventListener('load', function() {
      if (typeof firebase !== 'undefined' && firebase.initializeApp && window.__KC_FIREBASE_CONFIG) {
        try {
          firebase.initializeApp(window.__KC_FIREBASE_CONFIG);
          console.log('Firebase initialized');

          // Handle redirect result (when popup was blocked)
          firebase.auth().getRedirectResult().then(function(result) {
            if (result && result.user) {
              console.log('Firebase redirect auth succeeded');
            }
          }).catch(function(err) {
            if (err.code !== 'auth/credential-already-in-use') {
              console.warn('Firebase redirect result error:', err.message);
            }
          });
        } catch(e) {
          console.warn('Firebase init skipped:', e.message);
        }
      }
    });
  </script>
</body>
</html>
