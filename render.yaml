services:
  - type: web
    name: kimi-code-server
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && node setup.js
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: KIMI_DEFAULT_MODEL
        value: opencode-deepseek-v4
      - key: OPENAI_API_KEY
        sync: false
      - key: KIMI_CODE_PASSWORD
        sync: false
      - key: KIMI_PORT
        value: 58627
