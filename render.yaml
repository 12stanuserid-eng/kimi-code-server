services:
  - type: web
    name: kimi-code-server
    env: node
    region: oregon
    plan: free
    buildCommand: apt-get update -qq && apt-get install -y -qq pigz zstd > /dev/null 2>&1; npm install && node setup.js
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: KIMI_DEFAULT_MODEL
        value: opencode-zen-nemotron
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: KIMI_CODE_PASSWORD
        sync: false
      - key: KIMI_PORT
        value: 58627
