name: Build & Push to ttl.sh

on:
  push:
    branches: [ "pentaract-deploy" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push to ttl.sh
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: ttl.sh/pentaract-temp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
